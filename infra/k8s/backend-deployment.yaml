apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraudshield-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraudshield-backend
  template:
    metadata:
      labels:
        app: fraudshield-backend
    spec:
      containers:
        - name: backend
          image: fraudshield/backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fraudshield-secrets
                  key: database_url
            - name: REDIS_URL
              value: redis://fraudshield-redis:6379
            - name: RABBITMQ_URL
              value: amqp://guest:guest@fraudshield-rabbitmq:5672
            - name: INFERENCE_URL
              value: http://fraudshield-inference:8000
---
apiVersion: v1
kind: Service
metadata:
  name: fraudshield-backend
spec:
  selector:
    app: fraudshield-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
