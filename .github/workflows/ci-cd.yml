name: FraudShield CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: ${{ matrix.service }}
      - name: Build frontend
        if: matrix.service == 'frontend'
        run: npm run build
        working-directory: frontend
      - name: Security audit (non-blocking)
        run: npm audit --omit=dev || true
        working-directory: ${{ matrix.service }}

  docker-images:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t fraudshield/backend:latest ./backend
      - name: Build frontend image
        run: docker build -t fraudshield/frontend:latest ./frontend
      - name: Build inference image
        run: docker build -t fraudshield/inference:latest ./services/inference-fastapi
